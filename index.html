<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; background: #090a0f; }

        /* TELA 1 */
        #tela-inicial {
            height: 100vh;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
            display: flex; justify-content: center; align-items: center;
        }

        .cartao {
            background: rgba(45, 55, 72, 0.9);
            padding: 40px; border-radius: 15px;
            color: white; text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* TELA 2: Fundo animado com estrelas e corações */
        #tela-surpresa {
            display: none; height: 100vh;
            background: #0d0d1a;
            position: relative;
            justify-content: center; align-items: center;
            flex-direction: column; color: white;
            text-align: center;
        }

        .elemento {
            position: absolute; color: white;
            animation: mover 10s linear infinite;
        }

        @keyframes mover {
            0% { transform: translateY(100vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        button { padding: 10px 25px; border-radius: 20px; border: none; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="tela-inicial">
        <div class="cartao">
            <h1>Parabéns, Irmã! 🍰</h1>
            <p>Hoje é bu dia. Espero qu gostes.</p>
            <button onclick="revelar()">Clique para uma surpresa</button>
        </div>
    </div>

    <div id="tela-surpresa">
        <h1 style="z-index: 10;">Feliz Aniversário!</h1>
        <p style="font-size: 1.5rem; z-index: 10;">Escreva sua frase aqui no código.</p>

        <div class="elemento" style="left: 10%; animation-delay: 0s;">⭐</div>
        <div class="elemento" style="left: 30%; animation-delay: 2s;">❤️</div>
        <div class="elemento" style="left: 50%; animation-delay: 4s;">✨</div>
        <div class="elemento" style="left: 70%; animation-delay: 6s;">❤️</div>
        <div class="elemento" style="left: 90%; animation-delay: 8s;">⭐</div>
    </div>

    <script>
        function revelar() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('tela-surpresa').style.display = 'flex';
        }
    </script>
</body>
</html>
