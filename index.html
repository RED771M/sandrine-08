<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Surpresa de Aniversário</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        
        /* Fundo Inicial */
        #tela-inicial {
            height: 100vh;
            background: radial-gradient(circle, #1b2735 0%, #090a0f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s;
        }

        /* Fundo Animado e Colorido */
        #tela-surpresa {
            display: none;
            height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            background: #fff;
            color: #333;
        }

        textarea {
            width: 80%;
            height: 200px;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="tela-inicial">
        <h1>Parabéns, Irmã! 🎂</h1>
        <button onclick="mostrarSurpresa()">Clique para sua surpresa</button>
    </div>

    <div id="tela-surpresa">
        <h2 style="color: white; text-shadow: 2px 2px 4px #000;">Escreva sua mensagem aqui:</h2>
        <textarea placeholder="Digite seu texto carinhoso para ela aqui..."></textarea>
    </div>

    <script>
        function mostrarSurpresa() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('tela-surpresa').style.display = 'flex';
        }
    </script>
</body>
</html>
